name: Daily Pipeline (수동 트리거)

# 매일 02:00 KST (UTC 17:00 전날) 자동 실행 + 수동 트리거 지원
# 역할: 경매 데이터 수집(Playwright) → JSON 파일 git 커밋
# ETL / 분류 / 이미지 수집은 로컬에서 실행
on:
  schedule:
    - cron: "0 17 * * *"   # 매일 02:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    name: 경매 데이터 수집
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 의존성 설치
        run: pip install playwright

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      - name: 이전 수집 데이터 백업
        uses: actions/upload-artifact@v4
        with:
          name: raw-data-backup-${{ github.run_number }}
          path: |
            unipass_all_2b.json
            unipass_all_2c.json
          retention-days: 90
          if-no-files-found: ignore

      - name: 경매 데이터 수집 (2b - 사업자)
        run: python project/AWSLambda/UNIPASS_LIST_Business.py

      - name: 경매 데이터 수집 (2c - 개인)
        run: python project/AWSLambda/UNIPASS_LIST_Personal.py

      - name: 수집 데이터 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add unipass_all_2b.json unipass_all_2c.json
          if git diff --staged --quiet; then
            echo "데이터 변경사항 없음 — 커밋 및 push 생략"
          else
            git commit -m "chore: 일일 경매 데이터 수집 [skip ci]"
            git push origin HEAD:main
          fi
