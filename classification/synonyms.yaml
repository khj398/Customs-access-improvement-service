# =========================================================
# CAIS 동의어 사전 (synonyms.yaml)
# =========================================================
#
# 형식
# ----
# - src    : 물품명에서 추출되는 영문 토큰 (대문자)
# - terms  : 사용자가 검색할 한국어/영문 동의어 목록
#              text  : 검색어
#              type  : TRANSLATION | SYN | CATEGORY_HINT
#              weight: 검색 가중치 (1.0 기본, 높을수록 중요)
#
# 추가 기준
# ---------
# - 사용자 검색 쿼리와 물품 토큰을 연결하는 다리 역할
# - src_term 이 raw_token 에 포함되면 norm_term 이 SYN 토큰으로 생성됨
# - weight 1.8+ : 번역이 명확한 핵심 키워드
# - weight 1.2~1.5 : 카테고리 힌트 / 부가 동의어

