# =========================================================
# CAIS 분류 Rule 정의 파일
# =========================================================
#
# 형식 설명
# ---------
# - id           : Rule 고유 식별자 (영문_소문자)
# - priority     : 낮을수록 먼저 적용 (우선순위 높음)
# - keywords_all : 토큰이 모두 포함돼야 매칭 (AND 조건)
# - keywords_any : 토큰 중 하나라도 포함되면 매칭 (OR 조건)
# - category_path: 카테고리 경로 (대분류 / 중분류 / 소분류)
# - confidence   : 기본 신뢰도 (0~1)
# - rationale    : 분류 근거 설명
#
# ──────────────────────────────────────────
# 라벨 추가 기준
# ──────────────────────────────────────────
# 1. 동일 물품 5건 이상 미분류(fallback) 상태 발생 시 Rule 추가
# 2. keywords_all (AND)은 구체적 물품, keywords_any (OR)은 포괄 키워드에 사용
# 3. 더 구체적인 Rule을 낮은 priority(숫자)로 배치 → 먼저 매칭
# 4. OpenAI 동일 분류 제안 3건 이상 & confidence ≥ 0.85 → Rule 승격 검토
# 5. 폐기 기준: 최근 6개월 해당 카테고리 물품 0건
# ──────────────────────────────────────────

